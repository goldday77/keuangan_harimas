<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keuangan Harimas · Smart Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #1e1e2e; --border2: #2a2a3e; --accent: #6c63ff; --accent2: #a78bfa; --success: #34d399; --danger: #f87171; --warning: #fbbf24; --text: #e8e8f0; --text2: #8888a8; --text3: #4a4a6a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  .logo-anim { font-size: 32px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.8; transform: scale(0.98); } }
  
  .nav-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .page { display: none; padding: 76px 16px 100px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.4s ease; width: 100%; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .page.active { display: block; }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 100%; }
  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #7c73ff); border-radius: 18px; color: white; font-weight: 600; cursor: pointer; border:none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all 0.2s; }
  .btn-primary:active { transform: scale(0.98); }
  
  .form-control { width: 100%; max-width: 100%; box-sizing: border-box; background: var(--surface2); border: 1px solid var(--border2); border-radius: 16px; padding: 14px 18px; color: var(--text); outline: none; margin-bottom: 12px; display: block; -webkit-appearance: none; }
  
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.92); border-top: 1px solid var(--border); display: flex; padding: 10px 0 max(10px, env(safe-area-inset-bottom)); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); font-size: 11px; cursor: pointer; }
  .tab-item.active { color: var(--accent2); }

  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; padding: 12px 24px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 1000; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .balance-label { font-size: 10px; color: var(--text3); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; letter-spacing: 1px; }
  .balance-val { font-size: 24px; font-weight: 700; font-family: 'DM Mono'; }
  
  .tx-item { display: flex; align-items: center; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--border); }
</style>
</head>
<body>

<div id="welcome-screen">
  <div class="logo-anim">Keuangan <span style="color:var(--accent2)">Harimas</span></div>
  <button class="btn-primary" id="btnEnterApp" style="width:220px;" onclick="enterApp()">
    <i data-lucide="play" id="enterIcon"></i>
    <span id="enterText">Mulai Aplikasi</span>
  </button>
  <div id="loadingStatus" style="margin-top:20px; font-size:14px; color:var(--text2); font-style: italic;"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav-bar">
  <div style="font-weight:700; font-size:18px;">Keuangan <span style="color:var(--accent2)">Harimas</span></div>
  <div id="syncIndicator" style="width:10px; height:10px; border-radius:50%; background:var(--text3);"></div>
</nav>

<div class="page active" id="page-dashboard">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div class="card" style="margin-bottom:12px; padding: 16px; background: linear-gradient(145deg, #12121a, #1a1a2e);">
        <div class="balance-label">Rekening</div>
        <div class="balance-val" id="balBank" style="font-size: 18px;">Rp0</div>
    </div>
    <div class="card" style="margin-bottom:12px; padding: 16px; background: linear-gradient(145deg, #12121a, #16201a);">
        <div class="balance-label">Cash</div>
        <div class="balance-val" id="balCash" style="font-size: 18px; color: var(--success);">Rp0</div>
    </div>
  </div>
  <div id="budgetBars"></div>
  <div class="card">
    <div class="balance-label" style="margin-bottom:15px">Transaksi Terakhir</div>
    <div id="recentTxList"></div>
  </div>
</div>

<div class="page" id="page-add">
  <div class="card">
    <div style="display:flex; gap:12px; margin-bottom:20px">
      <button id="btn-exp" class="btn-primary" style="flex:1" onclick="setType('expense')">Pengeluaran</button>
      <button id="btn-inc" class="btn-primary" style="flex:1; background:var(--surface2); opacity:0.5" onclick="setType('income')">Pemasukan</button>
    </div>
    
    <label class="balance-label">Jumlah Uang</label>
    <input type="number" id="txAmount" class="form-control" placeholder="Rp 0" inputmode="numeric">
    
    <label class="balance-label">Kategori</label>
    <select id="txCategory" class="form-control" onchange="checkCategory(this.value)"></select>

    <div id="accountSelector">
        <label class="balance-label">Sumber Dana</label>
        <select id="txAccount" class="form-control">
            <option value="bank">🏦 Saldo Rekening</option>
            <option value="cash">💵 Saldo Cash</option>
        </select>
    </div>

    <label class="balance-label">Keterangan</label>
    <input type="text" id="txNote" class="form-control" placeholder="Misal: Beli Sate">
    
    <label class="balance-label">Tanggal</label>
    <input type="date" id="txDate" class="form-control">
    
    <button class="btn-primary" id="btnSaveTx" onclick="addTransaction()">
        <i data-lucide="save"></i>Simpan Data
    </button>
  </div>
</div>

<div class="page" id="page-transactions">
  <div class="card"><div class="balance-label" style="margin-bottom:15px">Riwayat Transaksi</div><div id="allTxList"></div></div>
</div>

<div class="page" id="page-settings">
  <div class="card">
    <label class="balance-label">URL GOOGLE SHEETS</label>
    <input type="url" id="gasUrl" class="form-control" oninput="saveUrl()" placeholder="https://script.google.com/...">
  </div>
  <div class="card" id="budgetSettings"></div>
  <button class="btn-primary" onclick="saveBudgets()">Simpan Budget</button>
  <button class="btn-primary" style="background:transparent; color:var(--danger); margin-top:20px" onclick="clearData()">Reset Data</button>
</div>

<nav class="tab-bar">
  <div class="tab-item active" onclick="showPage('dashboard', this)"><i data-lucide="layout-dashboard"></i><span>Beranda</span></div>
  <div class="tab-item" onclick="showPage('add', this)"><i data-lucide="plus-circle"></i><span>Input</span></div>
  <div class="tab-item" onclick="showPage('transactions', this)"><i data-lucide="list"></i><span>Riwayat</span></div>
  <div class="tab-item" onclick="showPage('settings', this)"><i data-lucide="settings-2"></i><span>Setelan</span></div>
</nav>

<script>
const GAS_URL_KEY = 'fOS_url', DATA_KEY = 'fOS_tx', BUDGET_KEY = 'fOS_bg';
const OBLIGATION_CATS = ['Investasi', 'Sewa Kost', 'Kas Kantor', 'Sedekah'];
const EXP_CATS = ['Makan Pokok','Bensin','Sewa Kost','Main Bola','Investasi','Belanja Bulanan','Jajan','Lain-lain','Kas Kantor','Tarik Tunai','Sedekah'];
const INC_CATS = ['Gaji', 'Bonus', 'Freelance', 'Lain-lain'];
const ICONS = {'Gaji':'💰','Makan Pokok':'🍚','Bensin':'⛽','Sewa Kost':'🏠','Main Bola':'⚽','Investasi':'📈','Belanja Bulanan':'🛒','Jajan':'🧋','Lain-lain':'📦','Kas Kantor':'🗂️','Tarik Tunai':'🏧','Sedekah':'🤲'};

let transactions = [], budgets = {}, gasUrl = '', currentType = 'expense';

async function enterApp() {
  document.getElementById('loadingStatus').textContent = 'Kemana perginya uangku?';
  gasUrl = localStorage.getItem(GAS_URL_KEY) || '';
  if (gasUrl) {
    try {
      const res = await fetch(gasUrl + '?action=getData');
      const remote = await res.json();
      transactions = remote.transactions || [];
      budgets = remote.budgets || {};
      saveLocal();
    } catch (e) { console.log('Offline'); }
  }
  setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; init(); }, 800);
}

function init() {
  transactions = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
  budgets = JSON.parse(localStorage.getItem(BUDGET_KEY)) || {};
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  setType('expense');
  renderDashboard();
  renderTransactions();
  renderBudgetSettings();
  lucide.createIcons();
}

function renderDashboard() {
  let bank = 0, cash = 0;
  // Kalkulasi ulang total dari nol agar akurat setiap kali dipanggil
  transactions.forEach(t => {
    if (t.type === 'income') {
      bank += Number(t.amount);
    } else {
      if (t.category === 'Tarik Tunai') {
        bank -= Number(t.amount);
        cash += Number(t.amount);
      } else {
        if (t.account === 'cash') cash -= Number(t.amount);
        else bank -= Number(t.amount);
      }
    }
  });

  document.getElementById('balBank').textContent = fmt(bank);
  document.getElementById('balCash').textContent = fmt(cash);
  
  const container = document.getElementById('budgetBars');
  container.innerHTML = '';
  EXP_CATS.filter(c => budgets[c] > 0 && c !== 'Tarik Tunai').forEach(cat => {
    const spent = transactions.filter(t => t.category === cat && t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
    const target = budgets[cat];
    const pct = Math.min((spent / target) * 100, 100);
    container.innerHTML += `
      <div class="card" style="margin-bottom:10px; padding:18px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px">
          <span style="font-weight:600">${cat}</span>
          <span>${fmt(spent)} / ${fmt(target)}</span>
        </div>
        <div style="height:6px; background:var(--border); border-radius:10px; overflow:hidden">
          <div style="height:100%; width:${pct}%; background:${pct>=100?'var(--danger)':'var(--accent)'}"></div>
        </div>
      </div>`;
  });
  renderTxList(transactions.slice(0, 5), 'recentTxList');
}

function checkCategory(val) {
    document.getElementById('accountSelector').style.display = (val === 'Tarik Tunai') ? 'none' : 'block';
}

async function addTransaction() {
  const amountInput = document.getElementById('txAmount');
  const noteInput = document.getElementById('txNote');
  const amount = parseFloat(amountInput.value);
  if(!amount) return;

  const tx = {
    id: Date.now().toString(),
    type: currentType,
    amount: amount,
    category: document.getElementById('txCategory').value,
    account: document.getElementById('txAccount').value,
    note: noteInput.value,
    date: document.getElementById('txDate').value
  };

  transactions.unshift(tx);
  saveLocal();
  
  // RESET FORM
  amountInput.value = '';
  noteInput.value = '';
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  
  renderDashboard();
  renderTransactions();
  showPage('dashboard');
  
  if(gasUrl) fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action:'saveAll', transactions, budgets }) });
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-exp').style.opacity = t === 'expense' ? '1' : '0.5';
  document.getElementById('btn-inc').style.opacity = t === 'income' ? '1' : '0.5';
  document.getElementById('accountSelector').style.display = t === 'expense' ? 'block' : 'none';
  const cats = t === 'expense' ? EXP_CATS : INC_CATS;
  document.getElementById('txCategory').innerHTML = cats.map(c => `<option value="${c}">${ICONS[c]||'🔹'} ${c}</option>`).join('');
}

function renderTxList(data, target) {
  document.getElementById(target).innerHTML = data.map(t => `
    <div class="tx-item">
      <div style="font-size:20px">${ICONS[t.category]||'🔹'}</div>
      <div style="flex:1">
        <div style="font-size:13px; font-weight:600">${t.category}</div>
        <div style="font-size:10px; color:var(--text3)">${t.account === 'cash' ? '💵 Cash' : '🏦 Bank'} • ${t.note || '-'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700; color:${t.type==='income'?'var(--success)':'var(--text)'}">${fmt(t.amount)}</div>
        <div style="font-size:9px; color:var(--text3)">${t.date}</div>
      </div>
    </div>
  `).join('') || '<p style="text-align:center; padding:20px; color:var(--text3);">Belum ada data</p>';
}

function fmt(n) { return 'Rp' + Math.abs(n).toLocaleString('id-ID'); }
function showPage(n, el) { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
    document.getElementById('page-'+n).classList.add('active'); 
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    lucide.createIcons();
}
function saveLocal() { 
  localStorage.setItem(DATA_KEY, JSON.stringify(transactions)); 
  localStorage.setItem(BUDGET_KEY, JSON.stringify(budgets)); 
}
function saveUrl() { localStorage.setItem(GAS_URL_KEY, document.getElementById('gasUrl').value); }
function renderBudgetSettings() { 
    document.getElementById('budgetSettings').innerHTML = '<div class="balance-label">Budget Bulanan</div>' + 
    EXP_CATS.filter(c => c !== 'Tarik Tunai').map(c => `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <span style="font-size:13px">${c}</span>
            <input type="number" class="form-control" style="width:120px;margin:0" id="b_${c.replace(/\s/g,'_')}" value="${budgets[c]||0}">
        </div>`).join(''); 
}
function saveBudgets() {
    EXP_CATS.forEach(c => { if(c !== 'Tarik Tunai') budgets[c] = parseFloat(document.getElementById(`b_${c.replace(/\s/g,'_')}`).value) || 0; });
    saveLocal(); renderDashboard();
}
function clearData() { if(confirm('Reset semua data?')) { localStorage.clear(); location.reload(); } }
enterApp();
</script>
</body>
</html>
