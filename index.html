<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keuangan Harimas · Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #1e1e2e; --border2: #2a2a3e; --accent: #6c63ff; --accent2: #a78bfa; --success: #34d399; --danger: #f87171; --warning: #fbbf24; --text: #e8e8f0; --text2: #8888a8; --text3: #4a4a6a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  
  #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.8s ease-in-out; }
  .nav-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .page { display: none; padding: 80px 16px 120px; max-width: 500px; margin: 0 auto; animation: fadeIn 0.3s ease; width: 100%; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 22px; margin-bottom: 16px; width: 100%; }
  
  /* Style Tombol Form */
  .btn-type { flex: 1; padding: 14px; border-radius: 16px; font-weight: 600; font-size: 14px; transition: all 0.3s ease; border: 1px solid transparent; color: var(--text3); background: var(--surface2); }
  .btn-type.active-exp { background: linear-gradient(135deg, var(--accent), #7c73ff); color: white; border: none; box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3); }
  .btn-type.active-inc { background: linear-gradient(135deg, var(--success), #10b981); color: white; border: none; box-shadow: 0 4px 15px rgba(52, 211, 153, 0.3); }

  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #7c73ff); border-radius: 18px; color: white; font-weight: 600; cursor: pointer; border:none; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
  .btn-primary:active { transform: scale(0.98); }
  
  .form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 16px; padding: 14px 18px; color: var(--text); outline: none; margin-bottom: 12px; display: block; }
  
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.92); border-top: 1px solid var(--border); display: flex; padding: 10px 0 max(10px, env(safe-area-inset-bottom)); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text3); font-size: 11px; cursor: pointer; }
  .tab-item.active { color: var(--accent2); }
  
  .balance-label { font-size: 10px; color: var(--text3); text-transform: uppercase; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; display: block; }
  .tx-item { display: flex; align-items: center; gap: 14px; padding: 16px 0; border-bottom: 1px solid var(--border); }
  
  .spin { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; padding: 10px 20px; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* Animasi Typewriter */
  .typing-text::after { content: '|'; animation: blink 0.7s infinite; margin-left: 2px; }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div id="welcome-screen">
  <div style="font-size:28px; font-weight:800; margin-bottom:20px;">Keuangan <span style="color:var(--accent2)">Harimas</span></div>
  <button class="btn-primary" style="width:200px" id="btnStart" onclick="enterApp()">Mulai Aplikasi</button>
  <div id="loadingStatus" class="typing-text" style="margin-top:25px; font-size:14px; color:var(--accent2); font-family:'DM Mono'; letter-spacing: -0.5px; min-height: 20px;"></div>
</div>

<div class="toast" id="toast"></div>

<nav class="nav-bar">
  <div style="font-weight:700; font-size:18px;">Keuangan <span style="color:var(--accent2)">Harimas</span></div>
  <div id="syncIndicator" style="width:10px; height:10px; border-radius:50%; background:var(--text3);"></div>
</nav>

<!-- BERANDA -->
<div class="page active" id="page-dashboard">
  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div class="card" style="padding: 16px;"><span class="balance-label">Rekening</span><div id="balBank" style="font-size: 18px; font-weight:700; font-family:'DM Mono'">Rp0</div></div>
    <div class="card" style="padding: 16px;"><span class="balance-label">Cash</span><div id="balCash" style="font-size: 18px; font-weight:700; font-family:'DM Mono'; color:var(--success)">Rp0</div></div>
  </div>
  <div id="budgetBars"></div>
  <div class="card"><span class="balance-label" style="margin-bottom:15px">Transaksi Terakhir</span><div id="recentTxList"></div></div>
</div>

<!-- INPUT -->
<div class="page" id="page-add">
  <div class="card">
    <div style="display:flex; gap:12px; margin-bottom:20px; background:var(--surface2); padding:6px; border-radius:20px;">
      <button id="btn-exp" class="btn-type active-exp" onclick="setType('expense')">Pengeluaran</button>
      <button id="btn-inc" class="btn-type" onclick="setType('income')">Pemasukan</button>
    </div>
    <span class="balance-label">Jumlah</span>
    <input type="number" id="txAmount" class="form-control" placeholder="Rp 0" inputmode="numeric">
    <span class="balance-label">Kategori</span>
    <select id="txCategory" class="form-control" onchange="checkCategory(this.value)"></select>
    <div id="accountSelector">
        <span class="balance-label">Sumber Dana</span>
        <select id="txAccount" class="form-control"><option value="bank">🏦 Rekening</option><option value="cash">💵 Cash</option></select>
    </div>
    <span class="balance-label">Keterangan</span>
    <input type="text" id="txNote" class="form-control" placeholder="Catatan...">
    <span class="balance-label">Tanggal</span>
    <input type="date" id="txDate" class="form-control">
    <button class="btn-primary" id="btnSaveTx" onclick="addTransaction()">Simpan Transaksi</button>
  </div>
</div>

<!-- RIWAYAT -->
<div class="page" id="page-transactions">
  <div class="card"><span class="balance-label" style="margin-bottom:15px">Riwayat Lengkap</span><div id="allTxList"></div></div>
</div>

<!-- SETELAN -->
<div class="page" id="page-settings">
  <div class="card">
    <span class="balance-label">Google Sheets URL</span>
    <input type="url" id="gasUrl" class="form-control" placeholder="https://script.google.com/..." oninput="saveUrl()">
    <button class="btn-primary" style="background:var(--surface2); font-size:13px; margin-top:5px" onclick="testConnection()">
        <i data-lucide="refresh-cw" id="iconTest"></i> Test & Sinkron Data
    </button>
    <div id="syncStatusText" style="font-size:11px; color:var(--text3); text-align:center; margin-top:8px;"></div>
  </div>
  <div class="card"><span class="balance-label" style="margin-bottom:15px">Target Budget Bulanan</span><div id="budgetSettingsContainer"></div><button class="btn-primary" style="margin-top:20px" onclick="saveBudgets()">Simpan Budget</button></div>
  <button class="btn-primary" style="background:transparent; color:var(--danger); border:1px solid rgba(248,113,113,0.2)" onclick="clearData()">Reset Semua Data</button>
</div>

<nav class="tab-bar">
  <div class="tab-item active" onclick="showPage('dashboard', this)"><i data-lucide="layout-dashboard"></i><span>Beranda</span></div>
  <div class="tab-item" onclick="showPage('add', this)"><i data-lucide="plus-circle"></i><span>Input</span></div>
  <div class="tab-item" onclick="showPage('transactions', this)"><i data-lucide="list"></i><span>Riwayat</span></div>
  <div class="tab-item" onclick="showPage('settings', this)"><i data-lucide="settings-2"></i><span>Setelan</span></div>
</nav>

<script>
const GAS_URL_KEY = 'fOS_url', DATA_KEY = 'fOS_tx', BUDGET_KEY = 'fOS_bg';
const EXP_CATS = ['Makan Pokok','Bensin','Sewa Kost','Main Bola','Investasi','Belanja Bulanan','Jajan','Lain-lain','Kas Kantor','Tarik Tunai','Sedekah'];
const INC_CATS = ['Gaji', 'Bonus', 'Freelance', 'Lain-lain'];
const ICONS = {'Gaji':'💰','Makan Pokok':'🍚','Bensin':'⛽','Sewa Kost':'🏠','Main Bola':'⚽','Investasi':'📈','Belanja Bulanan':'🛒','Jajan':'🧋','Lain-lain':'📦','Kas Kantor':'🗂️','Tarik Tunai':'🏧','Sedekah':'🤲'};

let transactions = [], budgets = {}, gasUrl = '', currentType = 'expense', qInterval;

function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// Animasi Ketik & Simbol ?
async function typeEffect(text) {
    const el = document.getElementById('loadingStatus');
    el.textContent = "";
    for (let i = 0; i < text.length; i++) {
        el.textContent += text[i];
        await new Promise(r => setTimeout(r, 60));
    }
    // Start question marks loop
    let count = 0;
    qInterval = setInterval(() => {
        count = (count + 1) % 5;
        el.textContent = text + "?".repeat(count);
    }, 400);
}

async function enterApp() {
  const btnStart = document.getElementById('btnStart');
  btnStart.style.display = 'none';
  gasUrl = localStorage.getItem(GAS_URL_KEY) || '';
  
  if (gasUrl) {
    await typeEffect("Kemana perginya uangku");
    await testConnection(true);
  }
  
  clearInterval(qInterval);
  document.getElementById('welcome-screen').style.opacity = '0';
  setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; init(); }, 800);
}

async function testConnection(silent = false) {
    const icon = document.getElementById('iconTest');
    const statusText = document.getElementById('syncStatusText');
    const url = silent ? gasUrl : document.getElementById('gasUrl').value.trim();
    if(!url) return;
    if(!silent) { icon.classList.add('spin'); statusText.textContent = 'Menghubungkan...'; }
    try {
        const res = await fetch(url + '?action=getData');
        const data = await res.json();
        transactions = data.transactions || [];
        budgets = data.budgets || {};
        saveLocal();
        document.getElementById('syncIndicator').style.background = '#34d399';
        if(!silent) { showToast('✓ Sinkronisasi Berhasil'); statusText.textContent = 'Terakhir sinkron: Baru saja'; renderDashboard(); renderBudgetSettings(); renderTransactions(); }
    } catch (e) { 
        if(!silent) { showToast('✗ Gagal Hubungkan Cloud'); statusText.textContent = 'Gagal terhubung. Cek URL Anda.'; }
    } finally { if(!silent && icon) icon.classList.remove('spin'); }
}

function init() {
  transactions = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
  budgets = JSON.parse(localStorage.getItem(BUDGET_KEY)) || {};
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('gasUrl').value = localStorage.getItem(GAS_URL_KEY) || '';
  setType('expense');
  renderDashboard();
  renderTransactions();
  renderBudgetSettings();
  lucide.createIcons();
}

function renderDashboard() {
  let bank = 0, cash = 0;
  transactions.forEach(t => {
    const amt = Number(t.amount);
    if (t.type === 'income') bank += amt;
    else if (t.category === 'Tarik Tunai') { bank -= amt; cash += amt; }
    else if (t.account === 'cash') cash -= amt;
    else bank -= amt;
  });
  document.getElementById('balBank').textContent = fmt(bank);
  document.getElementById('balCash').textContent = fmt(cash);
  
  const container = document.getElementById('budgetBars');
  container.innerHTML = '';
  EXP_CATS.filter(c => budgets[c] > 0 && c !== 'Tarik Tunai').forEach(cat => {
    const spent = transactions.filter(t => t.category === cat && t.type === 'expense').reduce((s,t) => s + Number(t.amount), 0);
    const target = budgets[cat];
    const pct = Math.min((spent / target) * 100, 100);
    container.innerHTML += `<div class="card" style="margin-bottom:10px; padding:15px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="font-weight:600">${cat}</span><span>${fmt(spent)} / ${fmt(target)}</span></div><div style="height:6px; background:var(--border); border-radius:10px; overflow:hidden"><div style="height:100%; width:${pct}%; background:${pct>=100?'var(--danger)':'var(--accent)'}"></div></div></div>`;
  });
  renderTxList(transactions.slice(0, 5), 'recentTxList', false);
}

function renderBudgetSettings() {
    const container = document.getElementById('budgetSettingsContainer');
    container.innerHTML = EXP_CATS.filter(c => c !== 'Tarik Tunai').map(c => `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-size:13px">${c}</span><input type="number" class="form-control" style="width:140px;margin:0;padding:8px 12px" id="input_b_${c.replace(/\s/g,'_')}" value="${budgets[c]||0}"></div>`).join('');
}

async function saveBudgets() {
    EXP_CATS.forEach(c => { if(c !== 'Tarik Tunai') { const el = document.getElementById(`input_b_${c.replace(/\s/g,'_')}`); if(el) budgets[c] = parseFloat(el.value) || 0; } });
    saveLocal(); showToast('✓ Budget Disimpan'); renderDashboard(); syncToCloud();
}

async function addTransaction() {
  const amtInput = document.getElementById('txAmount');
  const noteInput = document.getElementById('txNote');
  const accInput = document.getElementById('txAccount');
  const amt = parseFloat(amtInput.value);
  if(!amt) return;
  const tx = { id: Date.now().toString(), type: currentType, amount: amt, category: document.getElementById('txCategory').value, account: accInput.value, note: noteInput.value, date: document.getElementById('txDate').value };
  transactions.unshift(tx);
  saveLocal(); amtInput.value = ''; noteInput.value = ''; accInput.value = 'bank';
  renderDashboard(); renderTransactions(); showPage('dashboard'); syncToCloud();
}

function deleteTx(id) {
    if(!confirm('Hapus transaksi ini?')) return;
    transactions = transactions.filter(t => t.id !== id);
    saveLocal(); renderDashboard(); renderTransactions(); syncToCloud();
}

async function syncToCloud() {
    if(!gasUrl) return;
    try { await fetch(gasUrl, { method:'POST', mode:'no-cors', body:JSON.stringify({ action:'saveAll', transactions, budgets }) }); document.getElementById('syncIndicator').style.background = '#34d399'; } catch(e) {}
}

// Logic Ganti Tipe & Warna Tombol
function setType(t) {
  currentType = t;
  const btnExp = document.getElementById('btn-exp');
  const btnInc = document.getElementById('btn-inc');
  
  if (t === 'expense') {
      btnExp.className = 'btn-type active-exp';
      btnInc.className = 'btn-type';
  } else {
      btnExp.className = 'btn-type';
      btnInc.className = 'btn-type active-inc';
  }
  
  document.getElementById('accountSelector').style.display = t === 'expense' ? 'block' : 'none';
  const cats = t === 'expense' ? EXP_CATS : INC_CATS;
  document.getElementById('txCategory').innerHTML = cats.map(c => `<option value="${c}">${ICONS[c]||'🔹'} ${c}</option>`).join('');
}

function checkCategory(v) { document.getElementById('accountSelector').style.display = (v === 'Tarik Tunai') ? 'none' : 'block'; }
function fmt(n) { return 'Rp' + Math.abs(n).toLocaleString('id-ID'); }
function showPage(n, el) { 
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
    document.getElementById('page-'+n).classList.add('active'); 
    document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
    if(el) el.classList.add('active');
    if(n === 'settings') renderBudgetSettings();
    lucide.createIcons();
}
function renderTransactions() { renderTxList(transactions, 'allTxList', true); }
function renderTxList(data, target, showDelete) {
  document.getElementById(target).innerHTML = data.map(t => `
    <div class="tx-item">
      <div style="font-size:20px">${ICONS[t.category]||'🔹'}</div>
      <div style="flex:1">
        <div style="font-size:13px; font-weight:600">${t.category}</div>
        <div style="font-size:10px; color:var(--text3)">${t.account==='cash'?'💵 Cash':'🏦 Bank'} • ${t.note||'-'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-weight:700; color:${t.type==='income'?'var(--success)':'var(--text)'}">${fmt(t.amount)}</div>
        <div style="font-size:9px; color:var(--text3)">${t.date}</div>
      </div>
      ${showDelete ? `<div onclick="deleteTx('${t.id}')" style="margin-left:10px; color:var(--text3); cursor:pointer"><i data-lucide="trash-2" style="width:16px"></i></div>` : ''}
    </div>
  `).join('') || '<p style="text-align:center; padding:20px; color:var(--text3);">Belum ada data</p>';
  lucide.createIcons();
}
function saveLocal() { localStorage.setItem(DATA_KEY, JSON.stringify(transactions)); localStorage.setItem(BUDGET_KEY, JSON.stringify(budgets)); }
function saveUrl() { localStorage.setItem(GAS_URL_KEY, document.getElementById('gasUrl').value); }
function clearData() { if(confirm('Hapus semua data lokal?')) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
