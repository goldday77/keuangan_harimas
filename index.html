<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FinanceOS · Personal Finance</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26; --border: #1e1e2e; --border2: #2a2a3e; --accent: #6c63ff; --accent2: #a78bfa; --success: #34d399; --warning: #fbbf24; --danger: #f87171; --text: #e8e8f0; --text2: #8888a8; --text3: #4a4a6a; --income-color: #34d399; --expense-color: #f87171; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  
  /* Welcome Screen */
  #welcome-screen { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
  .welcome-logo { font-size: 32px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1px; }
  .welcome-logo span { color: var(--accent2); }
  .btn-enter { padding: 16px 40px; background: linear-gradient(135deg, var(--accent), #7c73ff); border-radius: 100px; color: white; font-weight: 600; font-size: 18px; box-shadow: 0 10px 25px rgba(108, 99, 255, 0.3); cursor: pointer; border: none; transition: all 0.3s; }
  .btn-enter:active { transform: scale(0.95); }
  .welcome-hint { color: var(--text3); font-size: 12px; margin-top: 20px; text-align: center; max-width: 250px; line-height: 1.6; }

  /* App Layout */
  .app-wrapper { position: relative; z-index: 1; }
  .nav-bar { position: fixed; top: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.85); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-size: 16px; font-weight: 700; color: var(--text); }
  .logo span { color: var(--accent2); }
  .sync-btn { display: flex; align-items: center; gap: 7px; padding: 7px 14px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; color: var(--text2); font-size: 12px; cursor: pointer; }
  .sync-btn.syncing svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; backdrop-filter: blur(20px); background: rgba(10,10,15,0.92); border-top: 1px solid var(--border); display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); }
  .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; color: var(--text3); font-size: 10px; cursor: pointer; }
  .tab-item.active { color: var(--accent2); }
  .page { display: none; padding: 76px 16px 90px; max-width: 500px; margin: 0 auto; }
  .page.active { display: block; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 14px; }
  .balance-hero { background: linear-gradient(135deg, var(--surface2) 0%, #1a1230 100%); border: 1px solid rgba(108,99,255,0.2); border-radius: 24px; padding: 28px 24px; margin-bottom: 14px; }
  .balance-amount { font-size: 36px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .section-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; margin: 20px 0 10px; }
  .progress-track { height: 6px; background: var(--border); border-radius: 100px; overflow: hidden; margin-top: 6px; }
  .progress-fill { height: 100%; transition: width 0.6s ease; }
  .tx-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .form-control { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 14px; padding: 13px 16px; color: var(--text); outline: none; margin-bottom: 10px; }
  .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), #7c73ff); border-radius: 16px; color: white; font-weight: 600; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface2); border: 1px solid var(--border2); border-radius: 100px; padding: 10px 20px; font-size: 13px; opacity: 0; transition: all 0.3s; z-index: 1000; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .dot-online { width: 7px; height: 7px; border-radius: 50%; background: var(--success); display: inline-block; box-shadow: 0 0 6px var(--success); }
  .dot-offline { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); display: inline-block; }
</style>
</head>
<body>

<div id="welcome-screen">
  <div class="welcome-logo">Finance<span>OS</span></div>
  <button class="btn-enter" id="enterBtn" onclick="enterApp()">Mulai Aplikasi</button>
  <div class="welcome-hint" id="welcomeHint">Klik untuk sinkronisasi data terbaru dari Google Sheets.</div>
</div>

<div class="app-wrapper">
  <nav class="nav-bar">
    <div class="logo">Finance<span>OS</span></div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span id="syncStatus" class="dot-offline"></span>
      <button class="sync-btn" id="syncBtn" onclick="syncNow()">
        <i data-lucide="refresh-cw" style="width:13px;height:13px;"></i>
        <span id="syncBtnText">Sync</span>
      </button>
    </div>
  </nav>

  <div class="toast" id="toast"></div>

  <div class="page active" id="page-dashboard">
    <div class="balance-hero">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;">Saldo Bersih</div>
      <div class="balance-amount" id="balanceAmount">Rp 0</div>
    </div>
    <div class="section-title">Budget Pengeluaran</div>
    <div class="card" id="budgetBars"></div>
    <div class="section-title">Transaksi Terbaru</div>
    <div class="card" id="recentTxList"></div>
  </div>

  <div class="page" id="page-add">
    <div class="card">
      <input type="number" class="form-control" id="txAmount" placeholder="Jumlah (Rp)" inputmode="numeric">
      <select class="form-control" id="txCategory"></select>
      <input type="text" class="form-control" id="txNote" placeholder="Catatan">
      <input type="date" class="form-control" id="txDate">
      <button class="btn-primary" onclick="addTransaction()">Simpan Transaksi</button>
    </div>
  </div>

  <div class="page" id="page-transactions">
    <div class="card" id="allTxList"></div>
  </div>

  <div class="page" id="page-settings">
    <div class="card">
      <label style="font-size:11px;color:var(--text3)">WEB APP URL</label>
      <input type="url" id="gasUrl" class="form-control" oninput="saveUrl()" placeholder="https://script.google.com/macros/s/...">
      <button class="btn-primary" style="background:var(--surface2);border:1px solid var(--border2);margin-top:10px;" onclick="testConnection()">Test Koneksi</button>
      <button class="btn-primary" style="background:transparent;color:var(--danger);margin-top:10px;" onclick="clearData()">Reset Semua Data</button>
    </div>
    <div class="section-title">Atur Budget Bulanan</div>
    <div class="card" id="budgetSettings"></div>
    <button class="btn-primary" onclick="saveBudgets()">Simpan Perubahan Budget</button>
  </div>

  <nav class="tab-bar">
    <div class="tab-item active" onclick="showPage('dashboard')"><i data-lucide="layout-dashboard"></i><span>Home</span></div>
    <div class="tab-item" onclick="showPage('add')"><i data-lucide="plus-circle"></i><span>Tambah</span></div>
    <div class="tab-item" onclick="showPage('transactions')"><i data-lucide="list"></i><span>Riwayat</span></div>
    <div class="tab-item" onclick="showPage('settings')"><i data-lucide="settings-2"></i><span>Setelan</span></div>
  </nav>
</div>

<script>
const GAS_URL_KEY = 'financeOS_gasUrl', DATA_KEY = 'financeOS_data', BUDGET_KEY = 'financeOS_budgets';
const EXPENSE_CATS = ['Makan Pokok','Bensin','Sewa Kost','Main Bola','Investasi','Belanja Bulanan','Jajan','Lain-lain','Kas Kantor','Kopi Kantor','Iuran Kantor','Sedekah','Biaya Admin Bank'];
const CAT_ICONS = {'Gaji':'💼','Makan Pokok':'🍚','Bensin':'⛽','Sewa Kost':'🏠','Main Bola':'⚽','Investasi':'📈','Belanja Bulanan':'🛒','Jajan':'🧋','Lain-lain':'📦','Kas Kantor':'🗂️','Kopi Kantor':'☕','Iuran Kantor':'🤝','Sedekah':'🤲','Biaya Admin Bank':'💳'};

let transactions = [], budgets = {}, gasUrl = '';

async function enterApp() {
  const btn = document.getElementById('enterBtn');
  const hint = document.getElementById('welcomeHint');
  gasUrl = localStorage.getItem(GAS_URL_KEY) || '';
  
  btn.disabled = true;
  btn.textContent = "Sinkronisasi...";
  hint.textContent = "Menghubungkan ke Google Sheets, mohon tunggu...";

  if (gasUrl) {
    try {
      await syncNow();
    } catch (e) {
      console.error(e);
      showToast('Gagal sinkron, menggunakan data offline','warning');
    }
  }
  
  document.getElementById('welcome-screen').style.opacity = '0';
  setTimeout(() => { document.getElementById('welcome-screen').style.display = 'none'; }, 500);
}

function init() {
  gasUrl = localStorage.getItem(GAS_URL_KEY) || '';
  if (document.getElementById('gasUrl')) document.getElementById('gasUrl').value = gasUrl;
  
  transactions = JSON.parse(localStorage.getItem(DATA_KEY)) || [];
  budgets = JSON.parse(localStorage.getItem(BUDGET_KEY)) || {};
  EXPENSE_CATS.forEach(c => { if (!budgets[c]) budgets[c] = 0; });
  
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  updateCategorySelect();
  renderBudgetSettings();
  renderDashboard();
  renderTransactions();
  lucide.createIcons();
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  lucide.createIcons();
}

function updateCategorySelect() {
  const sel = document.getElementById('txCategory');
  sel.innerHTML = EXPENSE_CATS.map(c => `<option value="${c}">${CAT_ICONS[c]||'💰'} ${c}</option>`).join('');
}

async function addTransaction() {
  const amount = parseFloat(document.getElementById('txAmount').value);
  const cat = document.getElementById('txCategory').value;
  const date = document.getElementById('txDate').value;
  if (!amount || !date) return showToast('Isi jumlah dan tanggal!','error');
  
  const tx = { id: Date.now().toString(), type: 'expense', amount, category: cat, note: document.getElementById('txNote').value, date };
  transactions.unshift(tx);
  saveLocal();
  renderDashboard();
  renderTransactions();
  showPage('dashboard');
  if (gasUrl) syncNow();
}

function saveLocal() { localStorage.setItem(DATA_KEY, JSON.stringify(transactions)); }

function renderDashboard() {
  const total = transactions.reduce((s,t) => s + t.amount, 0);
  document.getElementById('balanceAmount').textContent = fmt(total);
  
  const bars = EXPENSE_CATS.filter(c => budgets[c] > 0).map(cat => {
    const spent = transactions.filter(t => t.category === cat).reduce((s,t) => s + t.amount, 0);
    const budget = budgets[cat];
    const pct = Math.min((spent / budget) * 100, 100);
    return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px"><span>${cat}</span><span>${fmt(spent)} / ${fmt(budget)}</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%; background:${pct > 90 ? 'var(--danger)' : 'var(--accent)'}"></div></div></div>`;
  }).join('');
  document.getElementById('budgetBars').innerHTML = bars || '<p style="color:var(--text3);text-align:center">Belum ada budget diatur</p>';
  
  const recent = transactions.slice(0, 5).map(t => `<div class="tx-item"><div>${CAT_ICONS[t.category]||'💰'}</div><div style="flex:1"><div>${t.category}</div><div style="font-size:10px;color:var(--text3)">${t.date}</div></div><div style="font-weight:600">-${fmt(t.amount)}</div></div>`).join('');
  document.getElementById('recentTxList').innerHTML = recent || '<p style="color:var(--text3);text-align:center">Belum ada transaksi</p>';
}

function renderTransactions() {
  const list = transactions.map(t => `<div class="tx-item"><div>${CAT_ICONS[t.category]||'💰'}</div><div style="flex:1"><div>${t.category}</div><div style="font-size:10px;color:var(--text3)">${t.date}</div></div><div style="font-weight:600">-${fmt(t.amount)}</div></div>`).join('');
  document.getElementById('allTxList').innerHTML = list || '<p style="text-align:center">Kosong</p>';
}

function renderBudgetSettings() {
  document.getElementById('budgetSettings').innerHTML = EXPENSE_CATS.map(c => `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)"><span>${c}</span><input type="number" class="settings-input" style="width:100px;background:var(--surface2);border:1px solid var(--border2);color:white;text-align:right;padding:5px;border-radius:8px" id="b_${c.replace(/\s/g,'_')}" value="${budgets[c]||0}"></div>`).join('');
}

async function saveBudgets() {
  EXPENSE_CATS.forEach(c => { budgets[c] = parseFloat(document.getElementById(`b_${c.replace(/\s/g,'_')}`).value) || 0; });
  localStorage.setItem(BUDGET_KEY, JSON.stringify(budgets));
  if (gasUrl) await syncNow();
  showToast('Budget Disimpan');
}

async function syncNow() {
  if (!gasUrl) return;
  document.getElementById('syncBtn').classList.add('syncing');
  try {
    const res = await fetch(gasUrl + '?action=getData');
    const remote = await res.json();
    
    // Merge Transactions
    const remoteTx = remote.transactions || [];
    const mergedTx = [...remoteTx];
    transactions.forEach(lt => { if(!mergedTx.find(rt => rt.id === lt.id)) mergedTx.push(lt); });
    
    // Logika Budget: Jika lokal 0 tapi cloud ada isi, ambil cloud
    const remoteB = remote.budgets || {};
    const hasLocalB = Object.values(budgets).some(v => v > 0);
    const hasRemoteB = Object.values(remoteB).some(v => v > 0);
    
    if (hasRemoteB && !hasLocalB) {
      budgets = remoteB;
    } else {
      budgets = {...remoteB, ...budgets};
    }

    transactions = mergedTx;
    saveLocal();
    localStorage.setItem(BUDGET_KEY, JSON.stringify(budgets));

    // Kirim balik ke cloud
    await fetch(gasUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action:'saveAll', transactions, budgets }) });
    
    renderDashboard();
    renderBudgetSettings();
    document.getElementById('syncStatus').className = 'dot-online';
    showToast('✓ Sinkron Berhasil');
  } catch (e) {
    document.getElementById('syncStatus').className = 'dot-offline';
    showToast('✗ Gagal Sinkron', 'error');
  }
  document.getElementById('syncBtn').classList.remove('syncing');
}

function saveUrl() { gasUrl = document.getElementById('gasUrl').value.trim(); localStorage.setItem(GAS_URL_KEY, gasUrl); }
function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }
function showToast(m, type='') { const t = document.getElementById('toast'); t.textContent = m; t.className = 'toast show ' + type; setTimeout(()=>t.classList.remove('show'), 3000); }
function clearData() { if(confirm('Hapus semua data?')) { localStorage.clear(); location.reload(); } }

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
